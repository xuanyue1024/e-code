#ecode
server {
	listen 8088;
	# server_name ;

	# 用户端静态资源
	location / {
		root /usr/share/nginx/html;  # Vue打包后的dist目录
		try_files $uri $uri/ /index.html;  # 支持Vue路由
	}

	# 管理员前端静态资源挂载到 /admin，避免和用户端路由冲突
	location = /admin {
		return 301 /admin/;
	}

	location /admin/ {
		root /usr/share/nginx/html;
		try_files $uri $uri/ /admin/index.html;
	}

	# 管理员接口走 /api/admin 前缀，转发到后端真实 /admin/** 路由
	location /api/admin/ {
		proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $http_x_real_ip;          # 透传 X-Real-IP
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;  # 透传 X-Forwarded-For
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Origin $http_origin;

        proxy_max_temp_file_size 0;


		# 这里显式转发到管理员接口根路径，确保 /api/admin/** 正确映射到后端 /admin/**
		proxy_pass http://ecode:8088/admin/;

		# 禁用缓冲
		proxy_buffering off;
		proxy_cache off;
		# 保持长连接
		proxy_http_version 1.1;
		proxy_set_header Connection '';
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		# 超时设置（根据需要调整）
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;


		# 将此路由请求的实体大小限制为200m
		client_max_body_size 200m;
	}

	# 管理员用户名密码登录仍然复用统一登录接口，保留精确匹配
	location = /api/user/login {
		proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $http_x_real_ip;          # 透传 X-Real-IP
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;  # 透传 X-Forwarded-For
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Origin $http_origin;

        proxy_max_temp_file_size 0;


		# 管理员登录和用户登录共用该接口，因此保持转发到原有 /user/login
		proxy_pass http://ecode:8088/user/login;

		# 禁用缓冲
		proxy_buffering off;
		proxy_cache off;
		# 保持长连接
		proxy_http_version 1.1;
		proxy_set_header Connection '';
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		# 超时设置（根据需要调整）
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;


		# 将此路由请求的实体大小限制为200m
		client_max_body_size 200m;
	}

	location /api/ {
		proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $http_x_real_ip;          # 透传 X-Real-IP
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;  # 透传 X-Forwarded-For
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Origin $http_origin;

        proxy_max_temp_file_size 0;


		# 这里的http后面的url就是你访问你上方的域名代理的地址
		proxy_pass http://ecode:8088/;

		# 禁用缓冲
		proxy_buffering off;
		proxy_cache off;
		# 保持长连接
		proxy_http_version 1.1;
		proxy_set_header Connection '';
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		# 超时设置（根据需要调整）
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;


		# 将此路由请求的实体大小限制为200m
		client_max_body_size 200m;
		}
}
